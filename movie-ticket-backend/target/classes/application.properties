# 服务器配置
server.port=8080

# 数据库配置
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/movie_ticket?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA配置
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# 日志配置
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type=TRACE

# 静态资源配置
spring.web.resources.static-locations=file:${user.dir}/uploads/,classpath:/static/
spring.mvc.static-path-pattern=/uploads/**

# 文件上传配置
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# 响应编码配置
spring.http.encoding.force=true
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
server.tomcat.uri-encoding=UTF-8

# 支付宝沙箱配置
alipay.appId=9021000163628387
alipay.
alipay.
alipay.gatewayUrl=https://openapi-sandbox.dl.alipaydev.com/gateway.do
alipay.signType=RSA2
alipay.charset=UTF-8
alipay.format=json
alipay.returnUrl=http://localhost:5173/payment/success
alipay.notifyUrl=http://localhost:8080/api/alipay/notify